# .github/workflows/terraform-apply.yml

name: "IaC — Terraform Plan & Apply"

on:
  push:
    branches: [main, dev]
    paths:
      - '*.tf'
      - 'modules/**'
      - 'environments/**'
  pull_request:
    branches: [main, dev]
    paths:
      - '*.tf'
      - 'modules/**'
      - 'environments/**'
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy (dev/prod)"
        required: true
        default: "dev"
        type: choice
        options: [dev, prod]
      action:
        description: "Terraform action"
        required: true
        default: "plan"
        type: choice
        options: [plan, apply, destroy]

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  TF_VERSION: "1.7.0"
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_USE_OIDC: "true"
  
  # Non-sensitive TF variables (not secrets)
  TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  TF_VAR_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
  TF_VAR_smtp_host: "smtp.gmail.com"
  TF_VAR_smtp_port: "587"
  TF_VAR_admin_email: "admin@clahaanacademy.online"
  TF_VAR_sendgrid_api_key: ""
  TF_VAR_sendgrid_from: ""

jobs:
  setup:
    name: "⚙️ Setup"
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      tf_dir: ${{ steps.env.outputs.tf_dir }}
    
    steps:
      - name: Determine environment
        id: env
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            ENV="${{ github.event.inputs.environment }}"
          else
            BRANCH="${{ github.base_ref || github.ref_name }}"
            if [ "$BRANCH" == "main" ]; then
              ENV="prod"
            else
              ENV="dev"
            fi
          fi
          echo "environment=$ENV" >> $GITHUB_OUTPUT
          echo "tf_dir=." >> $GITHUB_OUTPUT
          echo "🌍 Environment: $ENV"

  terraform-validate:
    name: "✅ Validate"
    runs-on: ubuntu-latest
    needs: setup
    
    env:
      TF_VAR_github_app_client_id: ${{ secrets.TF_VAR_github_app_client_id }}
      TF_VAR_github_sp_object_id: ${{ secrets.TF_VAR_github_sp_object_id }}
      TF_VAR_deployer_object_id: ${{ secrets.TF_VAR_deployer_object_id }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      
      - name: Azure OIDC Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      
      - name: Terraform Init
        working-directory: ${{ needs.setup.outputs.tf_dir }}
        run: terraform init -reconfigure -backend-config="key=terraform-${{ needs.setup.outputs.environment }}.tfstate"
      
      - name: Terraform Format Check
        working-directory: ${{ needs.setup.outputs.tf_dir }}
        run: terraform fmt -check -recursive -diff
      
      - name: Terraform Validate
        working-directory: ${{ needs.setup.outputs.tf_dir }}
        run: terraform validate
      
      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ **Terraform Validate passed** for `${{ needs.setup.outputs.environment }}`'
            })

  terraform-scan:
    name: "🔍 Scan"
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4

      - name: Temporarily remove imports.tf for scanning
        run: rm -f imports.tf

      - name: Terraform Security Scan
        uses: aquasecurity/tfsec-action@v1.0.3

  terraform-plan:
    name: "📋 Plan (${{ needs.setup.outputs.environment }})"
    runs-on: ubuntu-latest
    needs: [setup, terraform-validate, terraform-scan]
    
    env:
      TF_VAR_github_app_client_id: ${{ secrets.TF_VAR_github_app_client_id }}
      TF_VAR_github_sp_object_id: ${{ secrets.TF_VAR_github_sp_object_id }}
      TF_VAR_deployer_object_id: ${{ secrets.TF_VAR_deployer_object_id }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      
      - name: Azure OIDC Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      
      - name: Terraform Init
        working-directory: ${{ needs.setup.outputs.tf_dir }}
        run: terraform init -reconfigure -backend-config="key=terraform-${{ needs.setup.outputs.environment }}.tfstate"
      
      - name: Terraform Plan
        id: plan
        working-directory: ${{ needs.setup.outputs.tf_dir }}
        run: |
          # 1. Get Key Vault name, Env, and RG name
          KV_NAME=$(grep -E '^\s*key_vault_name\s*=' "environments/${{ needs.setup.outputs.environment }}.tfvars" | cut -d'"' -f2)
          ENV_NAME=$(grep -E '^\s*environment\s*=' "environments/${{ needs.setup.outputs.environment }}.tfvars" | cut -d'"' -f2)
          RG_NAME=$(grep -E '^\s*resource_group_name\s*=' "environments/${{ needs.setup.outputs.environment }}.tfvars" | cut -d'"' -f2)
          
          if [ "$ENV_NAME" == "prod" ]; then
            ST_NAME="stclahan65bf2554"
          else
            ST_NAME="stclahan65bf2554dev"
          fi
          
          echo "Key Vault Name: $KV_NAME"
          echo "Storage Account Name: $ST_NAME"

          # 2. Get Runner IP
          RUNNER_IP=$(curl -s https://api.ipify.org)
          echo "Runner Public IP: $RUNNER_IP"

          # 3. Check what exists and whitelist initially
          KV_EXISTS=""
          ST_EXISTS=""

          if az keyvault show --name "$KV_NAME" >/dev/null 2>&1; then
            KV_EXISTS="true"
            echo "Key Vault $KV_NAME exists. Whitelisting Runner IP..."
            az keyvault network-rule add --name "$KV_NAME" --ip-address "$RUNNER_IP"
          fi

          if az storage account show --name "$ST_NAME" --resource-group "$RG_NAME" >/dev/null 2>&1; then
            ST_EXISTS="true"
            echo "Storage Account $ST_NAME exists. Whitelisting Runner IP..."
            az storage account network-rule add --account-name "$ST_NAME" --resource-group "$RG_NAME" --ip-address "$RUNNER_IP"
          fi

          # Helper function to wait for firewall rules to propagate
          wait_for_firewall() {
            local kv_name=$1
            local st_name=$2
            local rg_name=$3
            
            if [ -n "$kv_name" ]; then
              echo "Waiting for Key Vault $kv_name firewall to propagate..."
              for i in $(seq 1 12); do
                if az keyvault secret list --vault-name "$kv_name" >/dev/null 2>&1; then
                  echo "Key Vault is now accessible!"
                  break
                fi
                echo "Key Vault firewall still propagating ($i/12)..."
                sleep 5
              done
            fi
            
            if [ -n "$st_name" ]; then
              echo "Waiting for Storage Account $st_name firewall to propagate..."
              for i in $(seq 1 12); do
                if az storage container list --account-name "$st_name" --auth-mode login >/dev/null 2>&1; then
                  echo "Storage Account is now accessible!"
                  break
                fi
                echo "Storage Account firewall still propagating ($i/12)..."
                sleep 5
              done
            fi
          }

          # Setup cleanup trap
          if [ -n "$KV_EXISTS" ] || [ -n "$ST_EXISTS" ]; then
            trap 'echo "Cleaning up firewall rules...";
                  if [ -n "$KV_EXISTS" ]; then
                    az keyvault network-rule remove --name "$KV_NAME" --ip-address "$RUNNER_IP" || true
                  fi;
                  if [ -n "$ST_EXISTS" ]; then
                    az storage account network-rule remove --account-name "$ST_NAME" --resource-group "$RG_NAME" --ip-address "$RUNNER_IP" || true
                  fi' EXIT
            
            local_kv=""
            local_st=""
            if [ -n "$KV_EXISTS" ]; then local_kv="$KV_NAME"; fi
            if [ -n "$ST_EXISTS" ]; then local_st="$ST_NAME"; fi
            wait_for_firewall "$local_kv" "$local_st" "$RG_NAME"
          fi

          # 3. Run plan
          set +e
          if [ "${{ github.event.inputs.action }}" == "destroy" ]; then
            terraform plan -destroy -var-file=environments/${{ needs.setup.outputs.environment }}.tfvars -out=tfplan -detailed-exitcode -no-color > plan-output.txt 2>&1
            exitcode=$?
          else
            terraform plan -var-file=environments/${{ needs.setup.outputs.environment }}.tfvars -out=tfplan -detailed-exitcode -no-color > plan-output.txt 2>&1
            exitcode=$?
          fi
          set -e

          cat plan-output.txt

          if [ $exitcode -eq 1 ]; then
            echo "::error::Terraform plan failed with an error."
            exit 1
          fi
      
      - name: Save plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ needs.setup.outputs.environment }}
          path: |
            ${{ needs.setup.outputs.tf_dir }}/tfplan
            ${{ needs.setup.outputs.tf_dir }}/plan-output.txt
          retention-days: 5
      
      - name: Post plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync(
              '${{ needs.setup.outputs.tf_dir }}/plan-output.txt', 
              'utf8'
            ).slice(0, 60000);
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 📋 Terraform Plan — \`${{ needs.setup.outputs.environment }}\`\n\`\`\`hcl\n${planOutput}\n\`\`\``
            })

  terraform-apply:
    name: "🚀 Apply (${{ needs.setup.outputs.environment }})"
    runs-on: ubuntu-latest
    needs: [setup, terraform-plan]
    if: |
      ((github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev') && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action != 'plan')
    environment: ${{ needs.setup.outputs.environment == 'prod' && 'production' || 'infrastructure' }}
    
    env:
      TF_VAR_github_app_client_id: ${{ secrets.TF_VAR_github_app_client_id }}
      TF_VAR_github_sp_object_id: ${{ secrets.TF_VAR_github_sp_object_id }}
      TF_VAR_deployer_object_id: ${{ secrets.TF_VAR_deployer_object_id }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      
      - name: Azure OIDC Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      
      - name: Terraform Init
        working-directory: ${{ needs.setup.outputs.tf_dir }}
        run: terraform init -reconfigure -backend-config="key=terraform-${{ needs.setup.outputs.environment }}.tfstate"
      
      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ needs.setup.outputs.environment }}
          path: ${{ needs.setup.outputs.tf_dir }}
      
      - name: Terraform Apply or Destroy
        working-directory: ${{ needs.setup.outputs.tf_dir }}
        run: |
          # 1. Get Key Vault name, Env, and RG name
          KV_NAME=$(grep -E '^\s*key_vault_name\s*=' "environments/${{ needs.setup.outputs.environment }}.tfvars" | cut -d'"' -f2)
          ENV_NAME=$(grep -E '^\s*environment\s*=' "environments/${{ needs.setup.outputs.environment }}.tfvars" | cut -d'"' -f2)
          RG_NAME=$(grep -E '^\s*resource_group_name\s*=' "environments/${{ needs.setup.outputs.environment }}.tfvars" | cut -d'"' -f2)
          
          if [ "$ENV_NAME" == "prod" ]; then
            ST_NAME="stclahan65bf2554"
          else
            ST_NAME="stclahan65bf2554dev"
          fi
          
          echo "Key Vault Name: $KV_NAME"
          echo "Storage Account Name: $ST_NAME"

          # 2. Get Runner IP
          RUNNER_IP=$(curl -s https://api.ipify.org)
          echo "Runner Public IP: $RUNNER_IP"

          # 3. Check what exists and whitelist initially
          KV_EXISTS=""
          ST_EXISTS=""

          if az keyvault show --name "$KV_NAME" >/dev/null 2>&1; then
            KV_EXISTS="true"
            echo "Key Vault $KV_NAME exists. Whitelisting Runner IP..."
            az keyvault network-rule add --name "$KV_NAME" --ip-address "$RUNNER_IP"
          fi

          if az storage account show --name "$ST_NAME" --resource-group "$RG_NAME" >/dev/null 2>&1; then
            ST_EXISTS="true"
            echo "Storage Account $ST_NAME exists. Whitelisting Runner IP..."
            az storage account network-rule add --account-name "$ST_NAME" --resource-group "$RG_NAME" --ip-address "$RUNNER_IP"
          fi

          # Helper function to wait for firewall rules to propagate
          wait_for_firewall() {
            local kv_name=$1
            local st_name=$2
            local rg_name=$3
            
            if [ -n "$kv_name" ]; then
              echo "Waiting for Key Vault $kv_name firewall to propagate..."
              for i in $(seq 1 12); do
                if az keyvault secret list --vault-name "$kv_name" >/dev/null 2>&1; then
                  echo "Key Vault is now accessible!"
                  break
                fi
                echo "Key Vault firewall still propagating ($i/12)..."
                sleep 5
              done
            fi
            
            if [ -n "$st_name" ]; then
              echo "Waiting for Storage Account $st_name firewall to propagate..."
              for i in $(seq 1 12); do
                if az storage container list --account-name "$st_name" --auth-mode login >/dev/null 2>&1; then
                  echo "Storage Account is now accessible!"
                  break
                fi
                echo "Storage Account firewall still propagating ($i/12)..."
                sleep 5
              done
            fi
          }

          # Setup cleanup trap
          if [ -n "$KV_EXISTS" ] || [ -n "$ST_EXISTS" ]; then
            trap 'echo "Cleaning up firewall rules...";
                  if [ -n "$KV_EXISTS" ]; then
                    az keyvault network-rule remove --name "$KV_NAME" --ip-address "$RUNNER_IP" || true
                  fi;
                  if [ -n "$ST_EXISTS" ]; then
                    az storage account network-rule remove --account-name "$ST_NAME" --resource-group "$RG_NAME" --ip-address "$RUNNER_IP" || true
                  fi' EXIT
            
            local_kv=""
            local_st=""
            if [ -n "$KV_EXISTS" ]; then local_kv="$KV_NAME"; fi
            if [ -n "$ST_EXISTS" ]; then local_st="$ST_NAME"; fi
            wait_for_firewall "$local_kv" "$local_st" "$RG_NAME"
          fi

          # 4. Perform execution
          if [ "${{ github.event.inputs.action }}" == "destroy" ]; then
            terraform destroy -auto-approve -var-file=environments/${{ needs.setup.outputs.environment }}.tfvars
          else
            # First bootstrap the Key Vault and Storage modules
            terraform apply -target=module.keyvault -target=module.storage -auto-approve -var-file=environments/${{ needs.setup.outputs.environment }}.tfvars
            
            # If Key Vault was just created/enabled, whitelist it now
            if [ -z "$KV_EXISTS" ] && az keyvault show --name "$KV_NAME" >/dev/null 2>&1; then
              KV_EXISTS="true"
              echo "Key Vault $KV_NAME was just created. Whitelisting Runner IP..."
              az keyvault network-rule add --name "$KV_NAME" --ip-address "$RUNNER_IP"
              
              # Redefine trap to clean up Key Vault as well
              trap 'echo "Cleaning up firewall rules...";
                    if [ -n "$KV_EXISTS" ]; then
                      az keyvault network-rule remove --name "$KV_NAME" --ip-address "$RUNNER_IP" || true
                    fi;
                    if [ -n "$ST_EXISTS" ]; then
                      az storage account network-rule remove --account-name "$ST_NAME" --resource-group "$RG_NAME" --ip-address "$RUNNER_IP" || true
                    fi' EXIT
              wait_for_firewall "$KV_NAME" "" "$RG_NAME"
            fi

            # If Storage Account was just created/enabled, whitelist it now
            if [ -z "$ST_EXISTS" ] && az storage account show --name "$ST_NAME" --resource-group "$RG_NAME" >/dev/null 2>&1; then
              ST_EXISTS="true"
              echo "Storage Account $ST_NAME was just created. Whitelisting Runner IP..."
              az storage account network-rule add --account-name "$ST_NAME" --resource-group "$RG_NAME" --ip-address "$RUNNER_IP"
              
              # Redefine trap to clean up Storage as well
              trap 'echo "Cleaning up firewall rules...";
                    if [ -n "$KV_EXISTS" ]; then
                      az keyvault network-rule remove --name "$KV_NAME" --ip-address "$RUNNER_IP" || true
                    fi;
                    if [ -n "$ST_EXISTS" ]; then
                      az storage account network-rule remove --account-name "$ST_NAME" --resource-group "$RG_NAME" --ip-address "$RUNNER_IP" || true
                    fi' EXIT
              wait_for_firewall "" "$ST_NAME" "$RG_NAME"
            fi

            # 5. Check and create placeholder certificate
            if az keyvault certificate show --vault-name "$KV_NAME" --name "clahan-ssl-cert" >/dev/null 2>&1; then
              echo "Certificate 'clahan-ssl-cert' already exists and is active."
            elif az keyvault certificate list-deleted --vault-name "$KV_NAME" --query "[?name=='clahan-ssl-cert']" -o tsv | grep -q "clahan-ssl-cert"; then
              echo "Certificate 'clahan-ssl-cert' is in soft-deleted state. Recovering..."
              az keyvault certificate recover --vault-name "$KV_NAME" --name "clahan-ssl-cert"
              sleep 10
            else
              echo "Creating placeholder certificate 'clahan-ssl-cert' in Key Vault..."
              az keyvault certificate create --vault-name "$KV_NAME" --name "clahan-ssl-cert" --policy "$(az keyvault certificate get-default-policy)"
            fi
            
            # 6. Perform full apply
            terraform apply -auto-approve -var-file=environments/${{ needs.setup.outputs.environment }}.tfvars
          fi
      
      - name: Show outputs
        working-directory: ${{ needs.setup.outputs.tf_dir }}
        run: |
          echo "=== TERRAFORM OUTPUTS ==="
          terraform output -no-color || true
      
      - name: Summary
        run: |
          echo "✅ Terraform Action Complete"
          echo "🌍 Environment: ${{ needs.setup.outputs.environment }}"
