# .github/workflows/terraform-apply.yml
name: "IaC — Terraform Plan & Apply (Layered)"

on:
  push:
    branches: [main, dev]
    paths:
      - 'persistent/**'
      - 'transient/**'
      - 'modules/**'
      - 'environments/**'
  pull_request:
    branches: [main, dev]
    paths:
      - 'persistent/**'
      - 'transient/**'
      - 'modules/**'
      - 'environments/**'
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy (dev/prod)"
        required: true
        default: "dev"
        type: choice
        options: [dev, prod]
      action:
        description: "Terraform action"
        required: true
        default: "plan"
        type: choice
        options: [plan, apply, destroy]

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  TF_VERSION: "1.7.0"
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_USE_OIDC: "true"
  
  # Non-sensitive TF variables (not secrets)
  TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  TF_VAR_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
  TF_VAR_smtp_host: "smtp.gmail.com"
  TF_VAR_smtp_port: "587"
  TF_VAR_admin_email: "admin@clahaanacademy.online"
  TF_VAR_sendgrid_api_key: ""
  TF_VAR_sendgrid_from: ""

jobs:
  setup:
    name: "⚙️ Setup"
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
    
    steps:
      - name: Determine environment
        id: env
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            ENV="${{ github.event.inputs.environment }}"
          else
            BRANCH="${{ github.base_ref || github.ref_name }}"
            if [ "$BRANCH" == "main" ]; then
              ENV="prod"
            else
              ENV="dev"
            fi
          fi
          echo "environment=$ENV" >> $GITHUB_OUTPUT
          echo "🌍 Environment: $ENV"

  terraform-validate:
    name: "✅ Validate"
    runs-on: ubuntu-latest
    needs: setup
    
    env:
      TF_VAR_github_app_client_id: ${{ secrets.TF_VAR_github_app_client_id }}
      TF_VAR_github_sp_object_id: ${{ secrets.TF_VAR_github_sp_object_id }}
      TF_VAR_deployer_object_id: ${{ secrets.TF_VAR_deployer_object_id }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      
      - name: Azure OIDC Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      
      - name: Validate Persistent Layer
        run: |
          cd persistent
          terraform init -reconfigure -backend-config="key=persistent-${{ needs.setup.outputs.environment }}.tfstate"
          terraform validate
      
      - name: Validate Transient Layer
        run: |
          cd transient
          terraform init -reconfigure -backend-config="key=transient-${{ needs.setup.outputs.environment }}.tfstate"
          terraform validate

  terraform-plan:
    name: "📋 Plan (${{ needs.setup.outputs.environment }})"
    runs-on: ubuntu-latest
    needs: [setup, terraform-validate]
    
    env:
      TF_VAR_github_app_client_id: ${{ secrets.TF_VAR_github_app_client_id }}
      TF_VAR_github_sp_object_id: ${{ secrets.TF_VAR_github_sp_object_id }}
      TF_VAR_deployer_object_id: ${{ secrets.TF_VAR_deployer_object_id }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      
      - name: Azure OIDC Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Key Vault firewall access (if exists)
        run: |
          KV_NAME=$(grep -E '^\s*key_vault_name\s*=' "environments/${{ needs.setup.outputs.environment }}.tfvars" | cut -d'"' -f2)
          if az keyvault show --name "$KV_NAME" >/dev/null 2>&1; then
            echo "Key Vault $KV_NAME exists. Temporarily allowing access for plan..."
            az keyvault update --name "$KV_NAME" --default-action Allow
          fi

      - name: Plan Persistent Layer
        if: github.event.inputs.action != 'destroy'
        run: |
          cd persistent
          terraform init -reconfigure -backend-config="key=persistent-${{ needs.setup.outputs.environment }}.tfstate"
          terraform plan -var-file=../environments/${{ needs.setup.outputs.environment }}.tfvars -out=tfplan
          
      - name: Plan Transient Layer
        run: |
          cd transient
          terraform init -reconfigure -backend-config="key=transient-${{ needs.setup.outputs.environment }}.tfstate"
          if [ "${{ github.event.inputs.action }}" == "destroy" ]; then
            terraform plan -destroy -var-file=../environments/${{ needs.setup.outputs.environment }}.tfvars -out=tfplan
          else
            terraform plan -var-file=../environments/${{ needs.setup.outputs.environment }}.tfvars -out=tfplan
          fi

  terraform-apply:
    name: "🚀 Apply (${{ needs.setup.outputs.environment }})"
    runs-on: ubuntu-latest
    needs: [setup, terraform-plan]
    if: |
      ((github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev') && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action != 'plan')
    environment: ${{ needs.setup.outputs.environment == 'prod' && 'production' || 'infrastructure' }}
    
    env:
      TF_VAR_github_app_client_id: ${{ secrets.TF_VAR_github_app_client_id }}
      TF_VAR_github_sp_object_id: ${{ secrets.TF_VAR_github_sp_object_id }}
      TF_VAR_deployer_object_id: ${{ secrets.TF_VAR_deployer_object_id }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      
      - name: Azure OIDC Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run Apply or Destroy Action
        run: |
          KV_NAME=$(grep -E '^\s*key_vault_name\s*=' "environments/${{ needs.setup.outputs.environment }}.tfvars" | cut -d'"' -f2)
          
          if [ "${{ github.event.inputs.action }}" == "destroy" ]; then
            echo "🔥 DESTROY ACTION TRIGGERED: Deleting Transient Layer ONLY..."
            
            # Temporary firewall bypass if Key Vault exists
            if az keyvault show --name "$KV_NAME" >/dev/null 2>&1; then
              az keyvault update --name "$KV_NAME" --default-action Allow
            fi
            
            cd transient
            terraform init -reconfigure -backend-config="key=transient-${{ needs.setup.outputs.environment }}.tfstate"
            terraform destroy -auto-approve -var-file=../environments/${{ needs.setup.outputs.environment }}.tfvars
            
            # Reset firewall
            if az keyvault show --name "$KV_NAME" >/dev/null 2>&1; then
              az keyvault update --name "$KV_NAME" --default-action Deny
            fi
            
          else
            echo "🚀 APPLY ACTION TRIGGERED: Deploying Layered Infrastructure..."
            
            # 1. Apply Persistent Layer
            cd persistent
            terraform init -reconfigure -backend-config="key=persistent-${{ needs.setup.outputs.environment }}.tfstate"
            terraform apply -auto-approve -var-file=../environments/${{ needs.setup.outputs.environment }}.tfvars
            
            # 2. Key Vault Certificate check & placeholder creation (required for Gateway)
            if az keyvault show --name "$KV_NAME" >/dev/null 2>&1; then
              echo "Allowing Key Vault access temporarily..."
              az keyvault update --name "$KV_NAME" --default-action Allow
              sleep 10
              
              if az keyvault certificate show --vault-name "$KV_NAME" --name "clahan-ssl-cert" >/dev/null 2>&1; then
                echo "Certificate 'clahan-ssl-cert' already exists."
              elif az keyvault certificate list-deleted --vault-name "$KV_NAME" --query "[?name=='clahan-ssl-cert']" -o tsv | grep -q "clahan-ssl-cert"; then
                echo "Recovering soft-deleted certificate..."
                az keyvault certificate recover --vault-name "$KV_NAME" --name "clahan-ssl-cert"
                sleep 10
              else
                echo "Creating placeholder certificate..."
                az keyvault certificate create --vault-name "$KV_NAME" --name "clahan-ssl-cert" --policy "$(az keyvault certificate get-default-policy)"
              fi
              
              az keyvault update --name "$KV_NAME" --default-action Deny
            fi
            
            # 3. Apply Transient Layer
            cd ../transient
            terraform init -reconfigure -backend-config="key=transient-${{ needs.setup.outputs.environment }}.tfstate"
            terraform apply -auto-approve -var-file=../environments/${{ needs.setup.outputs.environment }}.tfvars
          fi
