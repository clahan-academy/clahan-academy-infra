version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: clahan-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: clahan
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d clahan"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: clahan-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth-service:
    build: ./auth-service
    container_name: clahan-auth-service
    ports:
      - "4001:4001"
    environment:
      PORT: 4001
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/clahan
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: super_secret_access_token_key
      JWT_REFRESH_SECRET: super_secret_refresh_token_key
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USER: aiexamplatform123@gmail.com
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  admin-service:
    build: ./admin-service
    container_name: clahan-admin-service
    ports:
      - "4002:4002"
    environment:
      PORT: 4002
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/clahan
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: super_secret_access_token_key
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  student-service:
    build: ./student-service
    container_name: clahan-student-service
    ports:
      - "4003:4003"
    environment:
      PORT: 4003
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/clahan
      JWT_ACCESS_SECRET: super_secret_access_token_key
    depends_on:
      postgres:
        condition: service_healthy

  exam-service:
    build: ./exam-service
    container_name: clahan-exam-service
    ports:
      - "4004:4004"
    environment:
      PORT: 4004
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/clahan
      JWT_ACCESS_SECRET: super_secret_access_token_key
      AI_SERVICE_URL: http://ai-service:8000
    depends_on:
      postgres:
        condition: service_healthy
      ai-service:
        condition: service_started

  proctoring-service:
    build: ./proctoring-service
    container_name: clahan-proctoring-service
    ports:
      - "4005:4005"
    environment:
      PORT: 4005
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/clahan
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: super_secret_access_token_key
      AI_SERVICE_URL: http://ai-service:8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-service:
        condition: service_started

  notification-service:
    build: ./notification-service
    container_name: clahan-notification-service
    ports:
      - "4006:4006"
    environment:
      PORT: 4006
      REDIS_URL: redis://redis:6379
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USER: aiexamplatform123@gmail.com
      SMTP_PASS: "zmso iaml jdkh wpxn"
      SMTP_FROM: aiexamplatform123@gmail.com
      FRONTEND_URL: http://localhost:5173
    depends_on:
      redis:
        condition: service_healthy

  ai-service:
    build: ./ai-service
    container_name: clahan-ai-service
    ports:
      - "8000:8000"
    environment:
      PORT: 8000
      OLLAMA_URL: http://ollama-service:11434
      YOLO_URL: http://yolo-service:8081
      FACE_URL: http://face-service:8082
      OCR_URL: http://ocr-service:8083

  frontend-service:
    build:
      context: ./frontend-service
      dockerfile: Dockerfile
    container_name: clahan-frontend-service
    ports:
      - "5173:5173"
      - "80:5173"
    depends_on:
      - auth-service
      - admin-service
      - student-service
      - exam-service
      - proctoring-service

volumes:
  pgdata:
  redisdata:
